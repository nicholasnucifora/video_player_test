<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disconnect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    .header { padding: 20px 40px; border-bottom: 1px solid #1f1f1f; }
    .header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.3px; color: #fff; }

    .main { padding: 36px 40px; max-width: 1200px; }
    .section-label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #555; margin-bottom: 18px; }

    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .video-card {
      display: block; text-decoration: none; color: inherit;
      background: #161616; border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: background 0.15s, transform 0.15s;
      border: 1px solid #1f1f1f;
    }
    .video-card:hover { background: #1e1e1e; transform: translateY(-2px); border-color: #2a2a2a; }

    .card-thumb-wrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
    .card-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb-wrap .play-icon {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s;
    }
    .video-card:hover .play-icon { opacity: 1; }
    .play-icon svg { width: 48px; height: 48px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6)); }

    .card-info { padding: 12px 14px 16px; }
    .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #eee; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-channel { font-size: 0.82rem; color: #666; }

    /* skeleton */
    .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
    .skel-title { height: 13px; margin-bottom: 8px; width: 88%; }
    .skel-title-2 { height: 13px; margin-bottom: 8px; width: 60%; }
    .skel-channel { height: 11px; width: 44%; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 600px) {
      .header { padding: 16px 20px; }
      .main { padding: 24px 20px; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Disconnect</h1>
  </header>
  <main class="main">
    <div class="section-label">Continue Watching</div>
    <div class="video-grid" id="videoGrid"></div>
  </main>

  <script>
    const VIDEOS = ['YFjfBk8HI5o'];

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const grid = document.getElementById('videoGrid');

    VIDEOS.forEach(id => {
      const card = document.createElement('a');
      card.className = 'video-card';
      card.href = '/player.html?v=' + id;
      card.innerHTML = `
        <div class="card-thumb-wrap">
          <img class="card-thumb" src="https://i.ytimg.com/vi/${id}/hqdefault.jpg" alt="" />
          <div class="play-icon">
            <svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="12" fill="rgba(0,0,0,0.5)"/><path d="M10 8l6 4-6 4V8z"/></svg>
          </div>
        </div>
        <div class="card-info" id="info-${id}">
          <div class="skeleton skel-title"></div>
          <div class="skeleton skel-title-2"></div>
          <div class="skeleton skel-channel"></div>
        </div>
      `;
      grid.appendChild(card);

      fetch('/api/video?id=' + id)
        .then(r => r.json())
        .then(data => {
          document.getElementById('info-' + id).innerHTML = `
            <div class="card-title">${escHtml(data.title || 'Untitled')}</div>
            <div class="card-channel">${escHtml(data.channelTitle || '')}</div>
          `;
        })
        .catch(() => {
          document.getElementById('info-' + id).innerHTML = `<div class="card-title">Video</div>`;
        });
    });
  </script>
</body>
</html>
